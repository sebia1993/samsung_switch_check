name: Windows CI

on:
  push:
    branches: [main, 'agent/**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-package:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Install exact .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.302

      - name: Validate solution, deployment helpers, and dependency advisories
        shell: powershell
        run: .\scripts\validate.ps1 -Configuration Release

      - name: Build unsigned POC packages
        shell: powershell
        run: .\scripts\build-release.ps1 -Version 0.4.0-poc -SkipTests

      - name: Upload immutable candidate artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: samsung-switch-watch-0.4.0-poc-${{ github.sha }}
          path: artifacts/release/*
          if-no-files-found: error
          retention-days: 14

  verify-downloaded-artifact:
    needs: validate-and-package
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout verification scripts
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Download candidate artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: samsung-switch-watch-0.4.0-poc-${{ github.sha }}
          path: artifacts/release

      - name: Verify post-download hashes and package contract
        shell: powershell
        run: .\scripts\test-package-contract.ps1 -ReleaseDirectory .\artifacts\release -Version 0.4.0-poc
