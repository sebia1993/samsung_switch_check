name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-package:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install exact .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.302

      - name: Validate solution, deployment helpers, and dependency advisories
        shell: powershell
        run: .\scripts\validate.ps1 -Configuration Release

      - name: Build unsigned POC packages
        shell: powershell
        run: .\scripts\build-release.ps1 -Version 0.9.6-poc -SkipTests

      - name: Upload immutable candidate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: samsung-switch-watch-0.9.6-poc-${{ github.sha }}
          path: artifacts/release/*
          if-no-files-found: error
          retention-days: 14

  verify-downloaded-artifact:
    needs: validate-and-package
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout verification scripts
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Download candidate artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: samsung-switch-watch-0.9.6-poc-${{ github.sha }}
          path: artifacts/release

      - name: Verify post-download hashes and package contract
        shell: powershell
        env:
          SSW_EXPECTED_SOURCE_COMMIT: ${{ github.sha }}
        run: .\scripts\test-package-contract.ps1 -ReleaseDirectory .\artifacts\release -Version 0.9.6-poc -ExpectedSourceCommit $env:SSW_EXPECTED_SOURCE_COMMIT
