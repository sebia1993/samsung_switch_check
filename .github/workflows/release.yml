name: Build and publish immutable release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Build-only semantic version (manual runs never publish)
        required: true
        default: 0.9.3-poc
        type: string

permissions:
  contents: read

concurrency:
  group: immutable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 40
    environment: release-signing
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      artifact-name: ${{ steps.version.outputs.artifact-name }}
      source-commit: ${{ github.sha }}
      tag-object: ${{ steps.source.outputs.tag-object }}
    steps:
      - name: Resolve build version
        id: version
        shell: powershell
        env:
          SSW_EVENT_NAME: ${{ github.event_name }}
          SSW_REF_NAME: ${{ github.ref_name }}
          SSW_INPUT_VERSION: ${{ inputs.version }}
          SSW_SOURCE_SHA: ${{ github.sha }}
        run: |
          if ($env:SSW_EVENT_NAME -eq 'push') {
            $tag = $env:SSW_REF_NAME
            if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?)$') { throw "Invalid release tag: $tag" }
            $version = $Matches.version
          }
          else {
            $tag = ''
            $version = $env:SSW_INPUT_VERSION
            if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') { throw "Invalid build-only version: $version" }
          }
          @(
            "tag=$tag"
            "version=$version"
            "artifact-name=samsung-switch-watch-$version-$($env:SSW_SOURCE_SHA)"
          ) | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Abort existing immutable release before build
        if: github.event_name == 'push'
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          SSW_RELEASE_TAG: ${{ steps.version.outputs.tag }}
          SSW_REPOSITORY: ${{ github.repository }}
        run: |
          $pagesJson = gh api --paginate --slurp "repos/$($env:SSW_REPOSITORY)/releases?per_page=100"
          if ($LASTEXITCODE -ne 0) { throw 'GitHub release preflight lookup failed.' }
          $pages = ($pagesJson -join "`n") | ConvertFrom-Json
          $matching = @($pages | ForEach-Object { $_ } | Where-Object { $_.tag_name -eq $env:SSW_RELEASE_TAG })
          if ($matching.Count -gt 0) { throw 'Immutable release or draft already exists; rebuilding or replacing its assets is forbidden.' }

      - name: Checkout exact source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag target
        id: source
        if: github.event_name == 'push'
        shell: powershell
        env:
          SSW_RELEASE_TAG: ${{ steps.version.outputs.tag }}
          SSW_SOURCE_SHA: ${{ github.sha }}
        run: |
          $head = (git rev-parse HEAD).Trim()
          $tagObject = (git rev-parse "refs/tags/$($env:SSW_RELEASE_TAG)").Trim()
          $peeledCommit = (git rev-parse "refs/tags/$($env:SSW_RELEASE_TAG)^{}").Trim()
          if ($head -ne $env:SSW_SOURCE_SHA -or $peeledCommit -ne $env:SSW_SOURCE_SHA) {
            throw 'Checked out commit does not match the tag event SHA.'
          }
          if ((git cat-file -t "refs/tags/$($env:SSW_RELEASE_TAG)").Trim() -ne 'tag') { throw 'Release tags must be annotated.' }
          git merge-base --is-ancestor $env:SSW_SOURCE_SHA 'origin/main'
          if ($LASTEXITCODE -ne 0) { throw 'Release tag target must be reachable from origin/main.' }
          @(
            "source-commit=$head"
            "tag-object=$tagObject"
          ) | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install exact .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.302

      - name: Materialize optional signing certificate
        id: signing
        shell: powershell
        env:
          SSW_SIGNING_PFX_BASE64: ${{ secrets.SSW_SIGNING_PFX_BASE64 }}
          SSW_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SSW_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SSW_SIGNING_PFX_BASE64)) {
            'certificate=' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host 'No signing secret supplied; build is restricted to a -poc prerelease.'
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:SSW_SIGNING_CERTIFICATE_PASSWORD)) { throw 'Signing certificate password secret is missing.' }
          $certificate = Join-Path $env:RUNNER_TEMP 'ssw-release-signing.pfx'
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:SSW_SIGNING_PFX_BASE64))
          "certificate=$certificate" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate and package
        shell: powershell
        env:
          SSW_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SSW_SIGNING_CERTIFICATE_PASSWORD }}
          SSW_RELEASE_VERSION: ${{ steps.version.outputs.version }}
          SSW_SIGNING_CERTIFICATE_PATH: ${{ steps.signing.outputs.certificate }}
        run: |
          $buildParameters = @{ Version = $env:SSW_RELEASE_VERSION }
          if (-not [string]::IsNullOrWhiteSpace($env:SSW_SIGNING_CERTIFICATE_PATH)) {
            $buildParameters.SigningCertificatePath = $env:SSW_SIGNING_CERTIFICATE_PATH
          }
          .\scripts\build-release.ps1 @buildParameters

      - name: Remove temporary signing certificate
        if: always() && steps.signing.outputs.certificate != ''
        shell: powershell
        env:
          SSW_SIGNING_CERTIFICATE_PATH: ${{ steps.signing.outputs.certificate }}
        run: Remove-Item -LiteralPath $env:SSW_SIGNING_CERTIFICATE_PATH -Force -ErrorAction SilentlyContinue

      - name: Upload internal validation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.version.outputs.artifact-name }}
          path: artifacts/release/*
          if-no-files-found: error
          retention-days: 14

  verify-download:
    needs: package
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout verification scripts
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.package.outputs.source-commit }}
          persist-credentials: false
      - name: Download packaged artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.package.outputs.artifact-name }}
          path: artifacts/release
      - name: Verify downloaded digest and contract
        shell: powershell
        env:
          SSW_RELEASE_VERSION: ${{ needs.package.outputs.version }}
          SSW_EXPECTED_SOURCE_COMMIT: ${{ needs.package.outputs.source-commit }}
        run: .\scripts\test-package-contract.ps1 -ReleaseDirectory .\artifacts\release -Version $env:SSW_RELEASE_VERSION -ExpectedSourceCommit $env:SSW_EXPECTED_SOURCE_COMMIT

  publish:
    if: github.event_name == 'push'
    needs: [package, verify-download]
    runs-on: windows-latest
    timeout-minutes: 25
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout release notes
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.package.outputs.source-commit }}
          fetch-depth: 0
          persist-credentials: false
      - name: Download verified artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.package.outputs.artifact-name }}
          path: artifacts/release
      - name: Abort if release already exists
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          SSW_RELEASE_TAG: ${{ needs.package.outputs.tag }}
          SSW_REPOSITORY: ${{ github.repository }}
        run: |
          $pagesJson = gh api -H 'X-GitHub-Api-Version: 2026-03-10' --paginate --slurp `
            "repos/$($env:SSW_REPOSITORY)/releases?per_page=100"
          if ($LASTEXITCODE -ne 0) { throw 'GitHub release preflight lookup failed.' }
          $pages = ($pagesJson -join "`n") | ConvertFrom-Json
          $matching = @($pages | ForEach-Object { $_ } | Where-Object { $_.tag_name -eq $env:SSW_RELEASE_TAG })
          if ($matching.Count -gt 0) { throw 'Immutable release or draft already exists; assets will not be overwritten.' }

      - name: Attest release assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            artifacts/release/SamsungSwitchWatch-Agent-${{ needs.package.outputs.version }}-win-x64.zip
            artifacts/release/SamsungSwitchWatch-Viewer-${{ needs.package.outputs.version }}-win-x64.zip

      - name: Verify release contract and provenance before publishing
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          SSW_RELEASE_VERSION: ${{ needs.package.outputs.version }}
          SSW_RELEASE_TAG: ${{ needs.package.outputs.tag }}
          SSW_REPOSITORY: ${{ github.repository }}
          SSW_SOURCE_COMMIT: ${{ needs.package.outputs.source-commit }}
        run: |
          .\scripts\test-package-contract.ps1 -ReleaseDirectory .\artifacts\release `
            -Version $env:SSW_RELEASE_VERSION -ExpectedSourceCommit $env:SSW_SOURCE_COMMIT
          $internalExpected = @(
            "SamsungSwitchWatch-Agent-$($env:SSW_RELEASE_VERSION)-win-x64.zip"
            "SamsungSwitchWatch-Viewer-$($env:SSW_RELEASE_VERSION)-win-x64.zip"
            'BUILD-MANIFEST.json'
            'SBOM.spdx.json'
            'SBOM.cdx.json'
            'SHA256SUMS.txt'
          ) | Sort-Object
          $internalActual = @(Get-ChildItem -LiteralPath 'artifacts/release' -File | ForEach-Object { $_.Name } | Sort-Object)
          if (($internalActual -join '|') -ne ($internalExpected -join '|')) {
            throw 'Internal validation artifact set differs from the six-file package contract.'
          }
          $publicAssetNames = @(
            "SamsungSwitchWatch-Agent-$($env:SSW_RELEASE_VERSION)-win-x64.zip"
            "SamsungSwitchWatch-Viewer-$($env:SSW_RELEASE_VERSION)-win-x64.zip"
          ) | Sort-Object

          foreach ($name in $publicAssetNames) {
            $path = Join-Path 'artifacts/release' $name
            $verified = $false
            foreach ($attempt in 1..5) {
              $oldPreference = $ErrorActionPreference
              $ErrorActionPreference = 'Continue'
              try {
                gh attestation verify $path --repo $env:SSW_REPOSITORY `
                  --signer-workflow "$($env:SSW_REPOSITORY)/.github/workflows/release.yml" `
                  --source-digest $env:SSW_SOURCE_COMMIT --source-ref "refs/tags/$($env:SSW_RELEASE_TAG)" `
                  --deny-self-hosted-runners *> $null
                $verificationExitCode = $LASTEXITCODE
              }
              finally { $ErrorActionPreference = $oldPreference }
              if ($verificationExitCode -eq 0) { $verified = $true; break }
              Start-Sleep -Seconds (5 * $attempt)
            }
            if (-not $verified) { throw "Artifact attestation verification failed: $name" }
          }
          $global:LASTEXITCODE = 0

      - name: Stage, verify, and publish immutable release exactly once
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          SSW_RELEASE_VERSION: ${{ needs.package.outputs.version }}
          SSW_RELEASE_TAG: ${{ needs.package.outputs.tag }}
          SSW_REPOSITORY: ${{ github.repository }}
          SSW_EXPECTED_TAG_OBJECT: ${{ needs.package.outputs.tag-object }}
          SSW_EXPECTED_SOURCE_COMMIT: ${{ needs.package.outputs.source-commit }}
        run: |
          $version = $env:SSW_RELEASE_VERSION
          $tag = $env:SSW_RELEASE_TAG
          $publicAssetNames = @(
            "SamsungSwitchWatch-Agent-$version-win-x64.zip"
            "SamsungSwitchWatch-Viewer-$version-win-x64.zip"
          ) | Sort-Object
          $internalExpected = @(
            $publicAssetNames
            'BUILD-MANIFEST.json'
            'SBOM.spdx.json'
            'SBOM.cdx.json'
            'SHA256SUMS.txt'
          ) | Sort-Object
          $internalActual = @(Get-ChildItem -LiteralPath 'artifacts/release' -File | ForEach-Object { $_.Name } | Sort-Object)
          if (($internalActual -join '|') -ne ($internalExpected -join '|')) {
            throw 'Internal validation artifact set differs from the six-file package contract.'
          }
          $publicAssets = @($publicAssetNames | ForEach-Object { Join-Path 'artifacts/release' $_ })
          foreach ($path in $publicAssets) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) { throw "Public release asset is missing: $path" }
          }

          $releaseNotesToken = $version.Replace('-', '_').ToUpperInvariant()
          $notes = "docs/RELEASE_NOTES_${releaseNotesToken}_KO.md"
          if (-not (Test-Path -LiteralPath $notes -PathType Leaf)) { throw "Exact release notes are missing: $notes" }

          function Assert-ReleaseTag {
            git fetch --force --no-tags origin `
              "+refs/tags/$($env:SSW_RELEASE_TAG):refs/tags/$($env:SSW_RELEASE_TAG)"
            if ($LASTEXITCODE -ne 0) { throw 'Release tag refresh failed.' }
            $tagObject = (git rev-parse "refs/tags/$($env:SSW_RELEASE_TAG)").Trim()
            $peeledCommit = (git rev-parse "refs/tags/$($env:SSW_RELEASE_TAG)^{}").Trim()
            if ((git cat-file -t "refs/tags/$($env:SSW_RELEASE_TAG)").Trim() -ne 'tag') {
              throw 'Release tag is no longer annotated.'
            }
            if ($tagObject -ne $env:SSW_EXPECTED_TAG_OBJECT -or $peeledCommit -ne $env:SSW_EXPECTED_SOURCE_COMMIT) {
              throw 'Release tag moved after packaging; publishing is forbidden.'
            }
          }

          $releaseId = $null
          $draftUrl = $null
          $draftCreated = $false
          $publishAttempted = $false
          $publicationCompleted = $false
          $serverConfirmedMutable = $false
          $serverConfirmedImmutable = $false
          try {
            Assert-ReleaseTag
            $arguments = @($tag) + $publicAssets + @(
              '--verify-tag', '--draft', '--title', "Samsung Switch Watch $version",
              '--repo', $env:SSW_REPOSITORY, '--notes-file', $notes
            )
            if ($version -match '-') { $arguments += '--prerelease' }
            $draftCreateOutput = @(gh release create @arguments)
            $draftCreateExitCode = $LASTEXITCODE
            if ($draftCreateExitCode -ne 0) { throw 'GitHub release draft creation failed.' }
            $draftOutputLines = @($draftCreateOutput | ForEach-Object { ([string]$_).Trim() } |
              Where-Object { $_.Length -gt 0 })
            if ($draftOutputLines.Count -eq 0) { throw 'GitHub release draft URL was not returned.' }
            $draftUrl = [string]$draftOutputLines[-1]
            $expectedDraftUrlPrefix = "https://github.com/$($env:SSW_REPOSITORY)/releases/tag/untagged-"
            if (-not $draftUrl.StartsWith($expectedDraftUrlPrefix, [StringComparison]::Ordinal)) {
              throw 'GitHub release draft returned an unexpected URL.'
            }
            $draftCreated = $true

            # GitHub can acknowledge draft creation before the releases list is consistent.
            # Never retry creation; retry only discovery, then bind every mutation to one numeric ID.
            $draft = $null
            foreach ($draftLookupAttempt in 1..12) {
              $oldPreference = $ErrorActionPreference
              $ErrorActionPreference = 'Continue'
              try {
                $pagesJson = gh api -H 'X-GitHub-Api-Version: 2026-03-10' --paginate --slurp `
                  "repos/$($env:SSW_REPOSITORY)/releases?per_page=100" 2>$null
                $draftLookupExitCode = $LASTEXITCODE
              }
              finally { $ErrorActionPreference = $oldPreference }

              if ($draftLookupExitCode -eq 0) {
                try { $pages = ($pagesJson -join "`n") | ConvertFrom-Json }
                catch { throw 'Created release draft lookup returned invalid JSON.' }
                $allReleases = @()
                foreach ($page in @($pages)) {
                  foreach ($release in @($page)) { $allReleases += $release }
                }
                $matching = @($allReleases | Where-Object { $_.tag_name -eq $tag })
                if ($matching.Count -gt 1) {
                  throw 'More than one matching release was found; automatic publication is forbidden.'
                }
                if ($matching.Count -eq 1) {
                  $candidate = $matching[0]
                  if (-not $candidate.draft -or $candidate.immutable) {
                    throw 'Matching release is not a mutable draft; automatic publication is forbidden.'
                  }
                  if ([string]$candidate.html_url -ne $draftUrl) {
                    throw 'Matching release URL differs from the draft created by this run.'
                  }
                  $draft = $candidate
                  break
                }
              }
              if ($draftLookupAttempt -lt 12) { Start-Sleep -Seconds 5 }
            }
            if ($null -eq $draft) {
              throw 'Created release draft was not discoverable within the bounded lookup window.'
            }

            $releaseId = [long]$draft.id
            $draftJson = gh api -H 'X-GitHub-Api-Version: 2026-03-10' `
              "repos/$($env:SSW_REPOSITORY)/releases/$releaseId"
            if ($LASTEXITCODE -ne 0) { throw 'Created release draft lookup by ID failed.' }
            $draft = ($draftJson -join "`n") | ConvertFrom-Json
            if ([long]$draft.id -ne $releaseId -or $draft.tag_name -ne $tag -or
                [string]$draft.html_url -ne $draftUrl -or -not $draft.draft -or $draft.immutable) {
              throw 'Created release draft identity changed before asset verification.'
            }
            $remoteNames = @($draft.assets | ForEach-Object { [string]$_.name } | Sort-Object)
            if (($remoteNames -join '|') -ne ($publicAssetNames -join '|')) {
              throw 'Uploaded draft asset set differs from the two-file public release contract.'
            }
            foreach ($name in $publicAssetNames) {
              $localPath = Join-Path 'artifacts/release' $name
              $localHash = (Get-FileHash -LiteralPath $localPath -Algorithm SHA256).Hash.ToLowerInvariant()
              $remote = @($draft.assets | Where-Object { $_.name -eq $name })
              if ($remote.Count -ne 1 -or $remote[0].state -ne 'uploaded' -or
                  [string]$remote[0].digest -ne "sha256:$localHash" -or
                  [long]$remote[0].size -ne (Get-Item -LiteralPath $localPath).Length) {
                throw "Uploaded draft digest or size differs from the local artifact: $name"
              }
            }

            # The active v* tag ruleset closes the remaining fetch-to-publish race.
            Assert-ReleaseTag
            $publishAttempted = $true
            $publishJson = gh api -H 'X-GitHub-Api-Version: 2026-03-10' --method PATCH `
              "repos/$($env:SSW_REPOSITORY)/releases/$releaseId" -F draft=false
            if ($LASTEXITCODE -ne 0) { throw 'GitHub release draft publication failed.' }
            $publishedRelease = ($publishJson -join "`n") | ConvertFrom-Json
            if ($publishedRelease.draft) { throw 'GitHub release remained a draft after publication.' }
            $publicationCompleted = $true
            $serverConfirmedImmutable = [bool]$publishedRelease.immutable

            $releaseAttestationVerified = $false
            $mutableObservations = 0
            foreach ($attempt in 1..8) {
              $releaseJson = @()
              $releaseLookupExitCode = 1
              $oldPreference = $ErrorActionPreference
              $ErrorActionPreference = 'Continue'
              try {
                $releaseJson = gh api -H 'X-GitHub-Api-Version: 2026-03-10' `
                  "repos/$($env:SSW_REPOSITORY)/releases/tags/$tag" 2>$null
                $releaseLookupExitCode = $LASTEXITCODE
              }
              finally { $ErrorActionPreference = $oldPreference }
              if ($releaseLookupExitCode -eq 0) {
                $release = ($releaseJson -join "`n") | ConvertFrom-Json
                if ($release.draft) { throw 'Published release unexpectedly returned to draft state.' }
                if ($release.immutable) {
                  $serverConfirmedImmutable = $true
                  $mutableObservations = 0
                }
                else {
                  $mutableObservations++
                }
              }

              $assetVerificationSucceeded = $serverConfirmedImmutable
              if ($serverConfirmedImmutable) {
                $releaseVerifyExitCode = 1
                $oldPreference = $ErrorActionPreference
                $ErrorActionPreference = 'Continue'
                try {
                  gh release verify $tag --repo $env:SSW_REPOSITORY *> $null
                  $releaseVerifyExitCode = $LASTEXITCODE
                  $assetVerificationSucceeded = $releaseVerifyExitCode -eq 0
                  if ($assetVerificationSucceeded) {
                    foreach ($name in $publicAssetNames) {
                      gh release verify-asset $tag (Join-Path 'artifacts/release' $name) `
                        --repo $env:SSW_REPOSITORY *> $null
                      $assetVerifyExitCode = $LASTEXITCODE
                      if ($assetVerifyExitCode -ne 0) { $assetVerificationSucceeded = $false; break }
                    }
                  }
                }
                finally { $ErrorActionPreference = $oldPreference }
              }
              if ($serverConfirmedImmutable -and $assetVerificationSucceeded) {
                $releaseAttestationVerified = $true
                break
              }
              Start-Sleep -Seconds (5 * $attempt)
            }
            if (-not $serverConfirmedImmutable) {
              $serverConfirmedMutable = $mutableObservations -ge 3
              if ($serverConfirmedMutable) {
                throw 'GitHub repeatedly confirmed immutable=false for the published release.'
              }
              throw 'Published release immutability could not be confirmed; automatic deletion is forbidden.'
            }
            if (-not $releaseAttestationVerified) {
              throw 'GitHub release attestation or published asset verification failed.'
            }
            Assert-ReleaseTag
            $global:LASTEXITCODE = 0
          }
          catch {
            $failure = $_
            $cleanupAllowed = $false
            $oldPreference = $ErrorActionPreference
            $ErrorActionPreference = 'Continue'
            try {
              if ($draftCreated -and -not $publishAttempted -and
                  $null -ne $releaseId -and $null -ne $draftUrl) {
                $cleanupJson = gh api -H 'X-GitHub-Api-Version: 2026-03-10' `
                  "repos/$($env:SSW_REPOSITORY)/releases/$releaseId" 2>$null
                if ($LASTEXITCODE -eq 0 -and $cleanupJson) {
                  try {
                    $cleanupRelease = ($cleanupJson -join "`n") | ConvertFrom-Json
                    $cleanupAllowed = [long]$cleanupRelease.id -eq $releaseId -and
                      $cleanupRelease.tag_name -eq $tag -and
                      [string]$cleanupRelease.html_url -eq $draftUrl -and
                      [bool]$cleanupRelease.draft -and -not [bool]$cleanupRelease.immutable
                  }
                  catch { $cleanupAllowed = $false }
                }
              }
              if ($cleanupAllowed) {
                gh api -H 'X-GitHub-Api-Version: 2026-03-10' --method DELETE `
                  "repos/$($env:SSW_REPOSITORY)/releases/$releaseId" *> $null
                if ($LASTEXITCODE -eq 0) {
                  Write-Warning 'The exact unpublished draft was removed by release ID after verification failure.'
                }
                else {
                  Write-Warning 'Automatic draft cleanup failed; inspect the matching release before retrying.'
                }
              }
              elseif ($publishAttempted) {
                Write-Warning 'Publication was attempted; automatic deletion was intentionally skipped regardless of observed state.'
              }
              elseif ($draftCreated -and $null -eq $releaseId) {
                Write-Warning 'A draft was created but its exact release ID was not confirmed; automatic deletion was skipped.'
              }
              elseif ($draftCreated) {
                Write-Warning 'The exact draft state could not be reconfirmed by release ID; automatic deletion was skipped.'
              }
            }
            finally { $ErrorActionPreference = $oldPreference }
            $global:LASTEXITCODE = 0
            throw $failure
          }
